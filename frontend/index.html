<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFF8F0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Saathi — साथी</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Screen 1: Persona Selection -->
    <div id="select-screen" class="screen active">
        <div class="select-container">
            <div class="select-header">
                <h1 class="brand">साथी</h1>
                <p class="tagline">आपका अपना, बस आपके लिए</p>
                <p class="instruction">अपना दोस्त चुनो और बात शुरू करो 🎤</p>
            </div>

            <div class="persona-cards">
                <button class="persona-card empathy" data-persona="empathy">
                    <div class="card-avatar">
                        <div class="avatar-circle empathy-avatar">
                            <span class="avatar-letter">ह</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-name">हमदर्द दोस्त</div>
                        <div class="card-quote">"बताओ, क्या चल रहा है दिल में?"</div>
                    </div>
                    <div class="card-loading">
                        <div class="spinner"></div>
                    </div>
                </button>

                <button class="persona-card funny" data-persona="funny">
                    <div class="card-avatar">
                        <div class="avatar-circle funny-avatar">
                            <span class="avatar-letter">क</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-name">कॉमेडियन यार</div>
                        <div class="card-quote">"चल भाई, हँसा देता हूँ तुझे!"</div>
                    </div>
                    <div class="card-loading">
                        <div class="spinner"></div>
                    </div>
                </button>

                <button class="persona-card angry" data-persona="angry">
                    <div class="card-avatar">
                        <div class="avatar-circle angry-avatar">
                            <span class="avatar-letter">अ</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-name">Uncle जी</div>
                        <div class="card-quote">"हमारे ज़माने में ऐसा नहीं होता था!"</div>
                    </div>
                    <div class="card-loading">
                        <div class="spinner"></div>
                    </div>
                </button>

                <button class="persona-card happy" data-persona="happy">
                    <div class="card-avatar">
                        <div class="avatar-circle happy-avatar">
                            <span class="avatar-letter">च</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-name">चीयरलीडर</div>
                        <div class="card-quote">"वाह! तुम तो कमाल हो बिलकुल!"</div>
                    </div>
                    <div class="card-loading">
                        <div class="spinner"></div>
                    </div>
                </button>

                <button class="persona-card loving" data-persona="loving">
                    <div class="card-avatar">
                        <div class="avatar-circle loving-avatar">
                            <span class="avatar-letter">द</span>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-name">प्यारे दादाजी</div>
                        <div class="card-quote">"बेटा, सब ठीक हो जाएगा।"</div>
                    </div>
                    <div class="card-loading">
                        <div class="spinner"></div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Screen 2: Conversation -->
    <div id="conversation-screen" class="screen">
        <div class="conv-header">
            <button id="change-persona-btn" class="back-btn" aria-label="Change persona">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            </button>
            <span id="persona-label" class="persona-label"></span>
        </div>

        <div class="conversation-container">
            <!-- Ambient gradient background -->
            <div id="ambient-bg" class="ambient-bg"></div>

            <!-- The Living Orb -->
            <div id="orb-container" class="orb-container">
                <canvas id="orb-canvas" width="300" height="300"></canvas>
            </div>

            <!-- Status -->
            <p id="status-text" class="status">सुन रहा हूँ...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.19/dist/bundle.min.js"></script>
    <script src="/static/audio-player.js"></script>
    <script src="/static/websocket.js"></script>
    <script src="/static/orb.js"></script>
    <script src="/static/vad.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
